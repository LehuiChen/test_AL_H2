project:
  # 冒烟配置：用于快速打通流程
  name: minimal_al_h2_ani_smoke
  description: "H2 ANI active learning smoke profile"

run:
  runs_dir: runs
  name_prefix: h2_ani_smoke
  smoke_name: h2_ani_smoke
  full_name: h2_ani_smoke

system:
  # H2 平衡结构与频率输入
  xyz: inputs/h2.xyz
  freq_json: inputs/h2_freq.json

reference:
  # 参考标注层级：Gaussian(g16) + DFT
  refmethod: B3LYP/6-31G*
  qmprog: gaussian
  nthreads: 8

training:
  ml_model_type: ANI
  device: cuda

active_learning:
  # 冒烟规模采样上限
  init_train_set_size: 5
  max_sampled_points:
    smoke: 50
    full: 50
  min_new_points: 5
  max_excess: 0.25
  min_excess: 0.20
  initial_temperature: 300.0
  maximum_propagation_time: 5.0
  time_step: 0.1
  label_nthreads: 4
  initial_points_refinement: cross-validation

uncertainty:
  # 主/副模型不确定性配置（committee）
  committee_size: 2
  metric: energy_forces
  uq_threshold: null
  energy_weight: 1.0
  force_weight: 1.0

cluster:
  # PBS 资源与提交命令
  scheduler: PBS
  submit_command: qsub
  python_command: python
  queue: GPU
  nodes: 1
  ppn: 24
  walltime: 24:00:00
  poll_interval_seconds: 20
  poll_timeout_seconds: 86400
  job_name: h2ani_al_smoke
  extra_pbs_lines: []
  env_blocks:
    default:
      - source ~/.bashrc
      - conda activate ADL_env
      - set +e
      - source /share/apps/gaussian/g16-env.sh
      - source /share/env/ips2018u1.env
      - set -e
      - 'echo "Python path: $(which python3 || which python)"'
      - 'echo "g16 path: $(which g16 || true)"'
