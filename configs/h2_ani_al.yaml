project:
  name: h2_ani_al
  description: "ANI-only H2 active learning reproduction"

run:
  runs_dir: runs
  name_prefix: h2_ani
  smoke_name: h2_ani_smoke
  full_name: h2_ani_full

system:
  xyz: inputs/h2.xyz
  freq_json: inputs/h2_freq.json

reference:
  refmethod: B3LYP/6-31G*
  qmprog: gaussian
  nthreads: 8

training:
  ml_model_type: ANI
  device: cuda

active_learning:
  init_train_set_size: 5
  max_sampled_points:
    smoke: 50
    full: 1000
  min_new_points: 5
  max_excess: 0.25
  min_excess: 0.20
  initial_temperature: 300
  maximum_propagation_time: 5.0
  time_step: 0.1
  label_nthreads: 4
  initial_points_refinement: cross-validation

cluster:
  submit_command: qsub
  python_command: python3
  queue: GPU
  nodes: 1
  ppn: 24
  walltime: 72:00:00
  poll_interval_seconds: 30
  poll_timeout_seconds: 172800
  job_name: h2ani
  env_blocks:
    default:
      - source ~/.bashrc
      - conda activate ADL_env
      - set +e
      - source /share/apps/gaussian/g16-env.sh
      - source /share/env/ips2018u1.env
      - set -e
      - echo "Python path: $(which python3 || which python)"
      - echo "g16 path: $(which g16 || true)"
